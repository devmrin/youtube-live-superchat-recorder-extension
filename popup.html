<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>Superchat Recorder</h2>
    <div class="stats" id="statsBtn" style="cursor: pointer;" title="Click to view/hide superchats">
      <span id="count">0</span> superchats recorded
    </div>
    <div id="listContainer" class="hidden">
      <ul id="superchatList"></ul>
    </div>
    <div class="controls">
      <button id="toggleBtn">Start Recording</button>
      <button id="downloadBtn">Export JSON</button>
      <button id="clearBtn">Clear Data</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
